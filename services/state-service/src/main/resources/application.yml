server:
  port: 8083

spring:
  application:
    name: state-service
  profiles:
    active: instagram
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/coredb
    username: core
    password: core
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: state-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: >
          com.coresys.common.events,
          com.coresys.common.events.brokerage,
          com.coresys.common.events.banking,
          com.coresys.common.events.instagram
        spring.json.use.type.headers: true
    listener:
      ack-mode: MANUAL

instagram:
  mega-influencer-threshold: 1000000
  timeline:
    max-size: 800

features:
  async:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
