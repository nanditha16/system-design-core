server:
  port: 8084

spring:
  application:
    name: reconciliation-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/coredb
    username: core
    password: core
  jpa:
    hibernate:
      ddl-auto: none        # read-only over state-service's schema
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true

recon:
  interval-ms: 30000
  sla-seconds: 60
  order:
    interval-ms: 30000
    sla-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
