server:
  port: 8082

spring:
  application:
    name: processing-service
  # DOMAIN FLAG — controls which consumers activate at startup
  # generic   -> TransactionConsumer      (transactions.incoming.v1)
  # brokerage -> OrderConsumer            (orders.incoming.v1)
  # banking   -> PaymentConsumer          (banking.payments.incoming.v1)
  # instagram -> PostFanoutConsumer       (instagram.posts.incoming.v1)
  #           -> FollowEventConsumer      (instagram.follow.events.v1)
  # ebay      -> ListingEnrichmentConsumer (ebay.listings.incoming.v1)
  #           -> InventoryEventForwarder   (ebay.inventory.events.v1)
  profiles:
    active: ebay
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: processing-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: >
          com.coresys.common.events,
          com.coresys.common.events.brokerage,
          com.coresys.common.events.banking,
          com.coresys.common.events.instagram,
          com.coresys.common.events.ebay
        spring.json.use.type.headers: true
    listener:
      ack-mode: MANUAL

downstream:
  state-url: http://localhost:8083

instagram:
  mega-influencer-threshold: 1000000

features:
  async:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics